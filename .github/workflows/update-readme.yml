name: 🔄 Auto-Update README

on:
  schedule:
    # Roda todo dia às 06:00 UTC (03:00 horário de Brasília)
    - cron: "0 6 * * *"
  push:
    branches:
      - main
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  update-readme:
    name: Atualizar README com repos e atividade recente
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Instalar dependências
        run: pip install requests

      - name: 🚀 Rodar script de atualização
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_readme.py

      - name: 💾 Commit e push das mudanças
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "🤖 Auto-update: repos e atividade recente [skip ci]"
          git push
